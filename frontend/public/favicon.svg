  <circle cx="50" cy="50" r="46" fill="#0e1626" stroke="url(#saffronGold)" stroke-width="4" filter="url(#glow)" />
  <text x="50" y="68" font-size="56" font-family="Arial, sans-serif" font-weight="bold" fill="url(#saffronGold)" text-anchor="middle" filter="url(#glow)">卐</text>
