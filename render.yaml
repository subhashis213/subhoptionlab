services:
  - type: web
    name: subhoptionlab-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: UPSTOX_API_KEY
        sync: false
      - key: UPSTOX_ACCESS_TOKEN
        sync: false
